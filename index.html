<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f3f4f1" />
  <title>Lexicon</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button id="brandBtn" class="brand" type="button">LEXICON</button>
    </header>

    <section id="homePage" class="page active">

      <section class="card hero-card">

        <div class="top-controls">
          <div class="mode-switch">
            <button id="wordModeBtn" class="mode-btn active" type="button">Слово</button>
            <button id="textModeBtn" class="mode-btn" type="button">Текст</button>
          </div>

          <button id="openFilesBtn" class="mini-btn">Файлы</button>
          <button id="openAiBtn" class="mini-btn">ИИ</button>
        </div>

        <div id="wordInputBox" class="input-box active">
          <label class="field main-field">
            <span>Перевод</span>
            <textarea id="wordInput" rows="3" placeholder="Введите слово, список слов или фразу"></textarea>
          </label>
          <button id="wordTranslateBtn" class="primary" type="button">Перевести</button>
        </div>

        <div id="textInputBox" class="input-box hidden">
          <label class="field main-field">
            <span>Перевод текста</span>
            <textarea id="textInput" rows="6" placeholder="Вставьте текст для перевода"></textarea>
          </label>
          <button id="textTranslateBtn" class="primary" type="button">Перевести</button>
        </div>

      </section>

      <section id="homeResultCard" class="card muted-card">
        <h2>Результат</h2>
        <div id="homeResult" class="status">Пока это UI-заглушка.</div>
      </section>

    </section>

    <!-- FILES PAGE ОСТАВЛЕНА -->
    <section id="filesPage" class="page hidden"></section>

    <section id="aiPage" class="page hidden"></section>
    <section id="lexiconPage" class="page hidden"></section>

  </main>

  <script src="./app.js"></script>
</body>
</html>
