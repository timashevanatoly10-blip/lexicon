<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f6f4b"/>
      <stop offset="100%" stop-color="#1e4f35"/>
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Рамка -->
  <rect x="96" y="96" width="320" height="320" rx="40"
        fill="none"
        stroke="#d6b36a"
        stroke-width="10"/>

  <!-- Текст -->
  <text x="50%" y="54%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="150"
        font-weight="600"
        fill="#f2d28a"
        letter-spacing="4">
    Lex
  </text>
</svg>
